name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "Before opening, search existing issues to avoid duplicates."
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Start with "As a user who..." or "When I try to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part of the app does this touch?
      multiple: true
      options:
        - Canvas / layer rendering
        - Properties panel
        - Layers panel
        - Slide Navigator
        - Toolbar
        - CLI export
        - Localization
        - Templates
        - New layer type
        - Data model / types
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
