name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 03:00 UTC — catches newly published CVEs
    - cron: '0 3 * * 1'

jobs:
  # Gitleaks (secrets) + Trivy (dependency CVEs)
  # Pinned to SHA — update intentionally when Battlellama-actions releases a new version.
  scan:
    uses: TheLastBattlellama/Battlellama-actions/.github/workflows/security-scan.yml@f1b1801b99c67cb5ff0a42fcabed4cc936414df9

  # Semgrep SAST for React / TypeScript
  sast:
    uses: TheLastBattlellama/Battlellama-actions/.github/workflows/sast-javascript.yml@f1b1801b99c67cb5ff0a42fcabed4cc936414df9
    with:
      framework: react
