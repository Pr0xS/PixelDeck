name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # cli-smoke job is intentionally omitted until a sample Project JSON is added to the repo.
  # When a sample exists, re-add this job:
  #
  # cli-smoke:
  #   name: CLI smoke test
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with: { node-version: 22.x, cache: npm }
  #     - run: npm ci
  #     - run: npx playwright install chromium --with-deps
  #     - run: npm run build
  #     - name: Export sample project
  #       run: |
  #         node cli/index.mjs export \
  #           --project=public/templates/sample.project.json \
  #           --output=/tmp/pixeldeck-smoke
  #     - name: Assert output exists
  #       run: test $(find /tmp/pixeldeck-smoke -name "*.png" | wc -l) -gt 0

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
