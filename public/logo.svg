<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 36" fill="none">
  <defs>
    <linearGradient id="pd-logo-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b49eff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pd-logo-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9d6ef6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="pd-text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: Left card -->
  <rect x="2" y="3" width="14" height="30" rx="3.5" fill="url(#pd-logo-l)"/>
  <rect x="4.5" y="10" width="9" height="1.8" rx="0.9" fill="white" fill-opacity="0.6"/>
  <rect x="4.5" y="13.5" width="6.5" height="1.8" rx="0.9" fill="white" fill-opacity="0.35"/>
  <rect x="4.5" y="18" width="9" height="9" rx="1.5" fill="white" fill-opacity="0.15"/>

  <!-- Icon mark: Right card -->
  <rect x="18" y="3" width="14" height="30" rx="3.5" fill="url(#pd-logo-r)"/>
  <rect x="20.5" y="10" width="9" height="1.8" rx="0.9" fill="white" fill-opacity="0.6"/>
  <rect x="20.5" y="13.5" width="6.5" height="1.8" rx="0.9" fill="white" fill-opacity="0.35"/>
  <rect x="20.5" y="18" width="9" height="9" rx="1.5" fill="white" fill-opacity="0.15"/>

  <!-- Wordmark: "Pixel" light + "Deck" bold accent -->
  <text
    x="40"
    y="24"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="18"
    letter-spacing="-0.3"
  >
    <tspan font-weight="300" fill="#e8e8f0">Pixel</tspan><tspan font-weight="700" fill="url(#pd-text-grad)">Deck</tspan>
  </text>
</svg>
